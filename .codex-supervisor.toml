schema_version = 1

[project]
name = "civic-test"
description = "Sweden Citizenship Test Prep — React Native + Expo + TypeScript"

# FLAT autonomous swarm. No CEO/MANAGER. Every host below is an autonomous
# worker that follows docs/parallel-sessions.md (THINK next -> LEARN the skill
# -> PLAN -> build -> VALIDATE+TEST -> ship a product PR; CI gate + operator
# pr-meta-guard are the only acceptance). Dead AI-factory-csup-* host blocks
# removed 2026-05-19 (never ran; poisoned `csup station/stop` targeting). Host
# names match the live `civic-sup` SLURM stanzas in ~/.config/csup/hosts.toml.

