name: Release validation

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    name: Validate release-safe candidate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium for static browser checks
        run: npx playwright install --with-deps chromium

      - name: Run full local validation suite
        run: npm run validate

      - name: Build real-enabled web ad fallback export
        env:
          EXPO_PUBLIC_REAL_ADS_ENABLED: 'true'
          EXPO_PUBLIC_ADMOB_ANDROID_HOME_BANNER_UNIT_ID: 'ca-app-pub-1234567890123456/1000000001'
          EXPO_PUBLIC_ADMOB_ANDROID_CHAPTER_LIST_BANNER_UNIT_ID: 'ca-app-pub-1234567890123456/1000000002'
          EXPO_PUBLIC_ADMOB_ANDROID_QUIZ_COMPLETED_INTERSTITIAL_UNIT_ID: 'ca-app-pub-1234567890123456/1000000003'
          EXPO_PUBLIC_ADMOB_ANDROID_RESULTS_NATIVE_UNIT_ID: 'ca-app-pub-1234567890123456/1000000004'
        run: |
          rm -rf dist-web
          npm run build:web:export -- --clear
          node scripts/prepare-web-export.js --check dist-web

      - name: Run real-enabled web ad fallback smoke
        run: npm run test:e2e -- tests/e2e/web-ad-real-fallback.spec.ts --workers=1

      - name: Verify release ownership guard
        run: npm run test:ownership

      - name: Verify external blocker checklist
        run: npm run test:external-blockers

      - name: Verify release evidence stubs are present or release is ready
        shell: bash
        run: |
          set +e
          npm run release:evidence-index
          code=$?
          set -e
          if [ "$code" -gt 1 ]; then
            exit "$code"
          fi
          grep -Eq 'Status \| (STUBS_READY|READY)' reports/release-evidence-index-latest.md

      - name: Upload release evidence index
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-evidence-index
          path: reports/release-evidence-index-latest.md
          if-no-files-found: ignore

      - name: Build web export for visual smoke
        run: npm run build:web:export -- --max-workers 2

      - name: Run visual smoke screenshots
        run: npm run test:e2e -- tests/e2e/visual-smoke.spec.ts --workers=1

      - name: Upload visual smoke artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: release-validation-visual-smoke-artifacts
          path: |
            test-results/
            playwright-report/
            reports/2026-05-15-uiux-screenshots/
          if-no-files-found: ignore
