name: Web export artifact

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXPO_NO_TELEMETRY: true
  CI: true

jobs:
  web-export:
    name: Build Expo web export
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build deploy-ready web export
        run: npm run build:web:export

      - name: Verify SPA fallback artifact
        run: node scripts/prepare-web-export.js --check dist-web

      - name: Upload web export artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist-web
          path: dist-web
          if-no-files-found: error
