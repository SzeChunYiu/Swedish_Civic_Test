name: Scheduled Vercel deploy

# The fast factory merges many PRs/hour; per-commit Vercel auto-deploy
# would blow the Hobby plan's hard 100-deploys/day cap. Instead redeploy
# the latest main every 15 minutes: 96 deploys/day — safely under 100,
# site never more than ~15 min stale. (Every 10 min = 144/day would
# EXCEED the cap; 15 min is the tightest safe cadence.)
# Activation requires repo secret VERCEL_DEPLOY_HOOK; until it exists,
# per-commit auto-deploy stays ON in vercel.json so the site isn't frozen.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

concurrency:
  group: scheduled-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    name: Trigger Vercel production deploy
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Fire Vercel Deploy Hook
        env:
          HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: |
          if [ -z "$HOOK" ]; then
            echo "::warning::VERCEL_DEPLOY_HOOK secret not set — skipping."
            echo "Create one: Vercel Project > Settings > Git > Deploy Hooks"
            echo "(branch: main), then add the URL as repo secret VERCEL_DEPLOY_HOOK."
            exit 0
          fi
          code=$(curl -s -o /dev/null -w '%{http_code}' -X POST "$HOOK")
          echo "Deploy hook responded HTTP $code"
          case "$code" in
            2*) echo "Deploy triggered." ;;
            *)  echo "::error::Deploy hook failed (HTTP $code)"; exit 1 ;;
          esac
