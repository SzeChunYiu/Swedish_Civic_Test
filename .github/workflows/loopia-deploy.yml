name: Deploy site to Loopia

# Uploads the static site in `site/` to Loopia shared hosting over SFTP
# whenever `main` changes (or run manually via the Actions tab).
#
# Required repo secrets (Settings → Secrets and variables → Actions → New repository secret):
#   LOOPIA_SFTP_HOST      e.g. sftp.loopia.se
#   LOOPIA_SFTP_USER      your Loopia FTP/SFTP account username (Kundzon → domain → FTP/SFTP-konton)
#   LOOPIA_SFTP_PASSWORD  that account's password
#   LOOPIA_REMOTE_DIR     the web root for your domain, e.g. /yourdomain.se/public_html
#
# Until those secrets are set, this workflow runs green and simply skips the upload.
# Only repo secrets are used (never untrusted event input), so there is no injection risk.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/loopia-deploy.yml'
  workflow_dispatch: {}

concurrency:
  group: loopia-deploy
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Loopia secrets are configured
        id: check
        env:
          HOST: ${{ secrets.LOOPIA_SFTP_HOST }}
        run: |
          if [ -z "$HOST" ]; then
            echo "::notice::Loopia secrets not set yet - skipping deploy. Add LOOPIA_SFTP_HOST / LOOPIA_SFTP_USER / LOOPIA_SFTP_PASSWORD / LOOPIA_REMOTE_DIR under Settings -> Secrets and variables -> Actions."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install lftp
        if: steps.check.outputs.ready == 'true'
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Upload site/ to Loopia over SFTP
        if: steps.check.outputs.ready == 'true'
        env:
          HOST: ${{ secrets.LOOPIA_SFTP_HOST }}
          USERNAME: ${{ secrets.LOOPIA_SFTP_USER }}
          LFTP_PASSWORD: ${{ secrets.LOOPIA_SFTP_PASSWORD }}
          REMOTE_DIR: ${{ secrets.LOOPIA_REMOTE_DIR }}
        run: |
          # --env-password reads LFTP_PASSWORD from the environment, so the
          # password never appears on the command line / in logs and special
          # characters are handled correctly.
          #
          # `mirror --reverse` uploads local -> remote. We intentionally do NOT
          # pass --delete by default: that would remove every remote file not
          # present in site/, which is destructive if REMOTE_DIR is wrong.
          # Once you've confirmed REMOTE_DIR points only at your site's
          # public_html, you can add `--delete` to prune stale files.
          lftp -u "$USERNAME" --env-password "sftp://$HOST" -e "
            set sftp:auto-confirm yes;
            set net:max-retries 2;
            set net:timeout 20;
            set mirror:parallel-transfer-count 4;
            mirror --reverse --verbose --no-perms \
              --exclude-glob .git* \
              ./site/ '$REMOTE_DIR';
            bye
          "
          echo "Deploy complete: site/ -> $REMOTE_DIR on $HOST"
