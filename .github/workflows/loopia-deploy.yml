name: Deploy site to Loopia

# Publishes the static site in `site/` to Loopia (almostswedish.se) over SSH+rsync
# on every push to `main` that touches site/, or on manual dispatch. Replaces the
# old FTPS path (which failed with 530). The pre-deploy gate is intentionally
# light and decoupled from the chronically-red app-level `release-validation`, so
# the site actually ships while still catching broken/missing files.
#
# Required repo secret:
#   LOOPIA_SSH_KEY  - private deploy key for wfcasb@ssh.loopia.se (web root below).

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/loopia-deploy.yml'
  workflow_dispatch:
    inputs:
      skip_gate:
        description: 'Skip the static-site checks (emergency deploy)'
        type: boolean
        default: false

concurrency:
  group: loopia-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  SSH_USER: wfcasb
  SSH_HOST: ssh.loopia.se
  REMOTE_DIR: almostswedish.se/public_html

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Static-site gate (syntax + required files)
        if: ${{ github.event.inputs.skip_gate != 'true' }}
        run: |
          set -e
          node --check site/app.js
          node --check site/purchase.js
          node --check site/v11.js
          for f in index.html app.js purchase.js questions.js styles.css ads.txt; do
            test -f "site/$f" || { echo "::error::missing site/$f"; exit 1; }
          done
          echo "static-site gate passed"

      - name: Refresh asset manifest (keeps the deployed copy consistent)
        run: node scripts/update-site-asset-manifest.js

      - name: Check deploy key is configured
        id: gate
        env:
          KEY: ${{ secrets.LOOPIA_SSH_KEY }}
        run: |
          if [ -z "$KEY" ]; then
            echo "::warning::LOOPIA_SSH_KEY not set - skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure SSH
        if: steps.gate.outputs.ready == 'true'
        env:
          KEY: ${{ secrets.LOOPIA_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$KEY" > ~/.ssh/loopia_deploy
          chmod 600 ~/.ssh/loopia_deploy
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Deploy site/ via rsync over SSH
        if: steps.gate.outputs.ready == 'true'
        run: |
          # Non-destructive (no --delete): unattended auto-deploy never removes
          # remote files, so a wrong path cannot wipe the site. Overwrites/adds only.
          rsync -rlptz --no-perms \
            -e "ssh -i ~/.ssh/loopia_deploy -o BatchMode=yes -o StrictHostKeyChecking=accept-new -o ConnectTimeout=20" \
            site/ "$SSH_USER@$SSH_HOST:$REMOTE_DIR/"
          echo "deployed site/ -> $SSH_USER@$SSH_HOST:$REMOTE_DIR"

      - name: Verify production responds
        if: steps.gate.outputs.ready == 'true'
        run: |
          sleep 3
          code=$(curl -s -o /tmp/live.html -w '%{http_code}' --max-time 25 "https://almostswedish.se/?ci=${GITHUB_SHA}")
          echo "https://almostswedish.se/ -> HTTP $code"
          grep -q '<title' /tmp/live.html && echo "live site responding" || { echo "::error::live site did not return HTML"; exit 1; }
