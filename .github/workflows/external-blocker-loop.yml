name: External release blocker loop

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  EXTERNAL_RELEASE_LOOP_STEP_TIMEOUT_MS: 120000
  EXTERNAL_RELEASE_LOOP_SKIP_EAS: true
  RELEASE_PREFLIGHT_SKIP_EXTERNAL_CHECKS: true
  RELEASE_PREFLIGHT_ALLOWED_DIRTY_PATHS: reports/external-release-loop-latest.md,reports/release-owner-action-packet-latest.md,reports/release-issue-update-latest.md,reports/release-issue-comment-latest.md,reports/release-owner-action-packet-comment-latest.md
  EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
  GH_TOKEN: ${{ github.token }}

jobs:
  evidence:
    name: Run external release blocker loop
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 26.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run external blocker loop and keep report
        shell: bash
        run: |
          set +e
          npm run release:external-blocker-loop -- --out reports/external-release-loop-latest.md
          code=$?
          set -e
          echo "EXTERNAL_RELEASE_LOOP_EXIT=$code"
          exit 0

      - name: Post release issue update and keep report
        if: always()
        shell: bash
        run: |
          set +e
          node scripts/post-release-issue-update.js --body-out reports/release-issue-update-latest.md --out reports/release-issue-comment-latest.md
          code=$?
          set -e
          echo "RELEASE_ISSUE_COMMENT_EXIT=$code"
          exit 0

      - name: Post owner action packet and keep report
        if: always()
        shell: bash
        run: |
          set +e
          node scripts/post-release-owner-action-packet.js --body-file reports/release-owner-action-packet-latest.md --out reports/release-owner-action-packet-comment-latest.md
          code=$?
          set -e
          echo "OWNER_ACTION_PACKET_COMMENT_EXIT=$code"
          exit 0

      - name: Upload external blocker loop report
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: external-release-loop
          path: |
            reports/external-release-loop-latest.md
            reports/release-owner-action-packet-latest.md
            reports/release-issue-update-latest.md
            reports/release-issue-comment-latest.md
            reports/release-owner-action-packet-comment-latest.md
          if-no-files-found: error
